version: 2

sources:
  - name: main
    description: "Raw data loaded by ingestion pipelines"
    tables:
      - name: raw_orders
        description: "Raw orders data"
        freshness:
          warn_after: {count: 24, period: hour}
          error_after: {count: 48, period: hour}
        # Freshness expects a timestamp; seeds cast order_date as DATE by default
        loaded_at_field: "cast(order_date as timestamp)"
      - name: raw_customers
        description: "Raw customers data"
      - name: raw_payments
        description: "Raw payments data"